<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <meta name="robots" content="noindex,nofollow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .login-bg { background: linear-gradient(135deg, #F9E8EE 0%, #EDD9F0 50%, #F5D0DC 100%); }
    input:focus { outline: none; border-color: #C97A94; box-shadow: 0 0 0 3px rgba(201,122,148,0.2); }
  </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-3xl shadow-xl w-full max-w-sm p-8 space-y-7">

    <!-- Logo -->
    <div class="text-center space-y-3">
      <div class="w-14 h-14 mx-auto rounded-full flex items-center justify-center" style="background:linear-gradient(135deg,#E8A0B4,#C4A8D4)">
        <i data-lucide="ice-cream-bowl" class="w-7 h-7 text-white"></i>
      </div>
      <div>
        <h1 class="font-display text-xl font-semibold" style="color:#2D2D2D">Panel Administrativo</h1>
        <p class="text-xs text-gray-400 mt-1">La Casa Del Helado</p>
      </div>
    </div>

    <!-- Form -->
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Correo electrónico</label>
        <div class="relative">
          <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
          <input id="email" type="email" placeholder="admin@lacasadelhelado.com"
            class="w-full pl-10 pr-4 py-2.5 rounded-xl border text-sm transition-all"
            style="border-color:#e0d0d8" />
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Contraseña</label>
        <div class="relative">
          <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
          <input id="password" type="password" placeholder="••••••••"
            class="w-full pl-10 pr-4 py-2.5 rounded-xl border text-sm transition-all"
            style="border-color:#e0d0d8" onkeydown="if(event.key==='Enter')loginAdmin()" />
        </div>
      </div>

      <div id="loginError" class="hidden flex items-center gap-2 text-xs text-red-500 bg-red-50 px-3 py-2 rounded-lg">
        <i data-lucide="alert-circle" class="w-3.5 h-3.5 flex-shrink-0"></i>
        <span id="loginErrorMsg">Credenciales incorrectas.</span>
      </div>

      <button onclick="loginAdmin()" id="loginBtn"
        class="w-full py-3 rounded-xl text-white font-medium text-sm transition-all hover:opacity-90 hover:shadow-md flex items-center justify-center gap-2"
        style="background:#C97A94">
        <i data-lucide="log-in" class="w-4 h-4"></i>
        Iniciar sesión
      </button>
    </div>

    <div class="text-center">
      <a href="index.html" class="text-xs text-gray-400 hover:text-gray-600 transition-colors flex items-center justify-center gap-1">
        <i data-lucide="arrow-left" class="w-3 h-3"></i> Volver al sitio
      </a>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script>
    lucide.createIcons();

    async function loginAdmin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errDiv   = document.getElementById('loginError');
      const errMsg   = document.getElementById('loginErrorMsg');

      if (!email || !password) {
        errMsg.textContent = 'Por favor completa todos los campos.';
        errDiv.classList.remove('hidden');
        return;
      }

      btn.innerHTML = `<i data-lucide="loader-circle" class="w-4 h-4 animate-spin"></i> Ingresando...`;
      btn.disabled  = true;
      errDiv.classList.add('hidden');
      lucide.createIcons();

      const { data, error } = await auth.signInWithPassword({ email, password });

      if (error || !data) {
        errMsg.textContent = 'Credenciales incorrectas. Verifica tu email y contraseña.';
        errDiv.classList.remove('hidden');
        btn.innerHTML = `<i data-lucide="log-in" class="w-4 h-4"></i> Iniciar sesión`;
        btn.disabled  = false;
        lucide.createIcons();
        return;
      }

      window.location.href = 'index.html';
    }

    // Redirect if already logged in
    if (auth.getUser() && auth.getToken()) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
